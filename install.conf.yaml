- clean: [
    '~'
]

- link:
    ~/.config/kitty: kitty
    ~/.config/nvim: nvim
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.zshrc: zshrc

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - ["vim +PlugUpdate +PlugClean! +qa", Installing and updating vim plugins]
